services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: guardian-livekit-server
    command: --config /livekit.yaml --dev
    volumes:
      - ./livekit.yaml:/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50050:50000-50050/udp"
    restart: always
